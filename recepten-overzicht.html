<!DOCTYPE html>
<html lang="nl"><head><meta charset="UTF-8"><link rel="stylesheet" href="css/style.css">
<style>
    .card { cursor: pointer; border: 1px solid #ddd; padding: 0; }
    .card img { border-radius: 15px 15px 0 0; }
    .panel { display: none; padding: 20px; background: #fff; }
    .btn { background: #007A6D; color: white; border: none; padding: 20px; width: 100%; font-size: 1.2rem; font-weight: bold; border-radius: 0 0 15px 15px; }
</style>
</head>
<body><div class="container">
    <h1>🍳 Keukenbeheer</h1>
    
    <div class="card" onclick="toggle(this.querySelector('.panel'))">
        <img src="https://images.unsplash.com/photo-1603360946369-dc9bb6258143?w=500&q=80">
        <div style="padding: 15px;">
            <h2>Braziliaanse stijl pita kip</h2>
            <p>Klaar in 20 min • 2,2 personen</p>
        </div>
        <div class="panel">
            <h3>Ingrediënten</h3>
            <ul id="ing1">
                <li>330g shoarmavlees</li><li>2,2 durum wraps</li><li>110g ijsbergsla</li><li>1,1 tomaat</li><li>0,55 komkommer</li>
            </ul>
            <h3>Bereiding</h3>
            <p>Bak vlees goudbruin, snijd groenten, vul de wraps.</p>
            <button class="btn" onclick="event.stopPropagation(); addRecept('ing1')">🛒 Toevoegen aan lijst</button>
        </div>
    </div>

    <script>
        function toggle(el) { el.style.display = (el.style.display === 'block') ? 'none' : 'block'; }
        function addRecept(id) {
            let items = Array.from(document.getElementById(id).querySelectorAll('li')).map(li => li.innerText);
            let list = JSON.parse(localStorage.getItem('boodschappen') || '[]');
            items.forEach(i => { if(!list.includes(i)) list.push(i); });
            localStorage.setItem('boodschappen', JSON.stringify(list));
            alert("Toegevoegd!");
        }
    </script>
</div>
</body></html>
