<script>
    function toggle(el) { el.style.display = (el.style.display === 'block') ? 'none' : 'block'; }
    function addRecept(id) {
        let items = Array.from(document.getElementById(id).querySelectorAll('li')).map(li => li.innerText);
        let list = JSON.parse(localStorage.getItem('boodschappen') || '[]');
        items.forEach(i => { if(!list.includes(i)) list.push(i); });
        localStorage.setItem('boodschappen', JSON.stringify(list));
        alert("Toegevoegd!");
    }
</script>
</body></html>
    <div class="card">
        <img src="https://images.unsplash.com/photo-1525351484163-7529414344d8?w=500&q=80" onclick="toggle(this.nextElementSibling)">
        <h2 onclick="toggle(this.nextElementSibling)">Spinaziequiche met spekjes</h2>
        <div class="panel">
            <ul id="ing7">
                <li>450g diepvriesspinazie</li><li>4 eieren</li><li>100g spekjes</li><li>150g geraspte kaas</li><li>1 rol bladerdeeg</li>
            </ul>
            <h3>Bereiding</h3>
            <p>Bekleed de vorm met bladerdeeg. Meng spinazie, eieren en kaas. Bak spekjes en voeg toe. 35 min in de oven op 200 graden.</p>
            <button class="btn" onclick="addRecept('ing7')">Voeg toe aan boodschappen</button>
        </div>
    </div>
