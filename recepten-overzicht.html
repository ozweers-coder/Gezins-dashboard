<!DOCTYPE html>
<html lang="nl"><head><meta charset="UTF-8"><link rel="stylesheet" href="css/style.css"></head>
<body><div class="container">
    <h1>🍳 Recepten</h1>
    <div id="recepten-lijst">
        <!-- Recepten worden hier geladen -->
    </div>
</div>
<div class="nav-bar">
    <a href="dashboard.html"><span class="icon">🏠</span>Home</a>
    <a href="boodschappen-lijst.html"><span class="icon">🛒</span>Lijst</a>
    <a href="recepten-overzicht.html" class="active"><span class="icon">🍳</span>Recepten</a>
</div>
<script>
    function toggle(el) { el.style.display = (el.style.display === 'block') ? 'none' : 'block'; }
    function addRecept(id) {
        let items = Array.from(document.getElementById(id).querySelectorAll('li')).map(li => li.innerText);
        let list = JSON.parse(localStorage.getItem('boodschappen') || '[]');
        items.forEach(i => { if(!list.includes(i)) list.push(i); });
        localStorage.setItem('boodschappen', JSON.stringify(list));
        alert("Toegevoegd!");
    }
</script>
</body></html>
